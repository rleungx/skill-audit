name: skill-audit release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[binary,dev]'

      - name: Run static checks
        run: |
          ruff check src tests

      - name: Run smoke checks
        run: |
          python -m compileall -q src
          python -m py_compile src/skill_audit/cli.py
          python -m skill_audit --help

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -t . -v

  build-binaries:
    name: Build ${{ matrix.asset_name }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: skill-audit-linux-x86_64
          - os: macos-13
            asset_name: skill-audit-macos-x86_64
          - os: macos-14
            asset_name: skill-audit-macos-arm64
          - os: windows-latest
            asset_name: skill-audit-windows-x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[binary]'

      - name: Build binary
        run: |
          PYINSTALLER_CONFIG_DIR=./build/pyinstaller-config pyinstaller --noconfirm --clean skill-audit.spec --distpath ./dist --workpath ./build/pyinstaller

      - name: Smoke test binary
        if: runner.os != 'Windows'
        run: |
          ./dist/skill-audit --help

      - name: Smoke test binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\dist\skill-audit.exe --help

      - name: Package release asset
        if: runner.os != 'Windows'
        run: |
          mkdir -p ./release
          cp ./dist/skill-audit "./release/${{ matrix.asset_name }}"
          tar -czf "${{ matrix.asset_name }}.tar.gz" -C ./release "${{ matrix.asset_name }}"

      - name: Package release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\release | Out-Null
          Copy-Item .\dist\skill-audit.exe ".\release\${{ matrix.asset_name }}.exe"
          Compress-Archive -Path ".\release\${{ matrix.asset_name }}.exe" -DestinationPath ".\${{ matrix.asset_name }}.zip" -Force

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_name }}
          path: |
            ./${{ matrix.asset_name }}.tar.gz
            ./${{ matrix.asset_name }}.zip
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
          generate_release_notes: true
