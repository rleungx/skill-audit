name: skill-audit CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[binary,dev]'

      - name: Run static checks
        run: |
          ruff check src tests

      - name: Run smoke checks
        run: |
          python -m compileall -q src
          python -m py_compile src/skill_audit/cli.py
          python -m skill_audit --help

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -t . -v

      - name: Build binary
        run: |
          PYINSTALLER_CONFIG_DIR=./build/pyinstaller-config pyinstaller --noconfirm --clean skill-audit.spec --distpath ./dist --workpath ./build/pyinstaller
          ./dist/skill-audit --help

      - name: Run skill evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          GOOGLE_BASE_URL: ${{ vars.GOOGLE_BASE_URL }}
          XAI_BASE_URL: ${{ vars.XAI_BASE_URL }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          ZHIPU_BASE_URL: ${{ vars.ZHIPU_BASE_URL }}
          GROQ_BASE_URL: ${{ vars.GROQ_BASE_URL }}
          SKILL_AUDIT_PROVIDER: ${{ vars.SKILL_AUDIT_PROVIDER }}
          SKILL_AUDIT_MODEL: ${{ vars.SKILL_AUDIT_MODEL }}
          SKILL_AUDIT_THRESHOLD: ${{ vars.SKILL_AUDIT_THRESHOLD }}
          SKILL_AUDIT_URL: ${{ vars.SKILL_AUDIT_URL }}
          SKILL_AUDIT_REQUIRED: ${{ vars.SKILL_AUDIT_REQUIRED }}
        run: |
          set -euo pipefail

          provider="${SKILL_AUDIT_PROVIDER:-openai}"
          model="${SKILL_AUDIT_MODEL:-gpt-5.4}"
          threshold="${SKILL_AUDIT_THRESHOLD:-85}"
          url="${SKILL_AUDIT_URL:-}"
          required="$(echo "${SKILL_AUDIT_REQUIRED:-}" | tr '[:upper:]' '[:lower:]')"
          report_dir="${RUNNER_TEMP:-/tmp}/skill-audit-reports"

          mapfile -t skill_files < <(find . -name SKILL.md -print | sort)
          if [[ "${#skill_files[@]}" -eq 0 ]]; then
            echo "No SKILL.md found; skipping evaluation."
            exit 0
          fi

          mkdir -p "$report_dir"

          require_or_skip() {
            local message="$1"
            if [[ "$required" == "1" || "$required" == "true" || "$required" == "yes" ]]; then
              echo "$message"
              exit 2
            fi
            echo "$message; skipping."
            exit 0
          }

          case "$provider" in
            ollama)
              :
              ;;
            openai)
              [[ -n "${OPENAI_API_KEY:-}" ]] || require_or_skip "Missing OPENAI_API_KEY"
              ;;
            minimax)
              [[ -n "${MINIMAX_API_KEY:-}" ]] || require_or_skip "Missing MINIMAX_API_KEY"
              ;;
            anthropic)
              [[ -n "${ANTHROPIC_API_KEY:-}" ]] || require_or_skip "Missing ANTHROPIC_API_KEY"
              ;;
            google)
              [[ -n "${GOOGLE_API_KEY:-}" ]] || require_or_skip "Missing GOOGLE_API_KEY"
              ;;
            xai)
              [[ -n "${XAI_API_KEY:-}" ]] || require_or_skip "Missing XAI_API_KEY"
              ;;
            deepseek)
              [[ -n "${DEEPSEEK_API_KEY:-}" ]] || require_or_skip "Missing DEEPSEEK_API_KEY"
              ;;
            zhipu)
              [[ -n "${ZHIPU_API_KEY:-}" ]] || require_or_skip "Missing ZHIPU_API_KEY"
              ;;
            groq)
              [[ -n "${GROQ_API_KEY:-}" ]] || require_or_skip "Missing GROQ_API_KEY"
              ;;
            *)
              echo "Unknown provider: $provider"
              exit 2
              ;;
          esac

          for skill_file in "${skill_files[@]}"; do
            slug="$(printf '%s' "${skill_file#./}" | tr '/ ' '__' | tr -cd '[:alnum:]_.-')"
            report_path="$report_dir/${slug%.md}.html"

            echo "Evaluating $skill_file"
            if [[ -n "$url" ]]; then
              ./dist/skill-audit --file "$skill_file" --provider "$provider" --model "$model" --threshold "$threshold" --url "$url" --report "$report_path"
            else
              ./dist/skill-audit --file "$skill_file" --provider "$provider" --model "$model" --threshold "$threshold" --report "$report_path"
            fi
          done

      - name: Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-audit-reports
          path: ${{ runner.temp }}/skill-audit-reports/*.html
          if-no-files-found: ignore

      - name: Upload binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-audit-binary
          path: ./dist/skill-audit
          if-no-files-found: ignore
