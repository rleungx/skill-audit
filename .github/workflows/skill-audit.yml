name: Skill.md Quality Gate

on:
  push:
    paths:
      - "**/SKILL.md"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/skill-check.yml"
  pull_request:
    paths:
      - "**/SKILL.md"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/skill-check.yml"
  workflow_dispatch:

jobs:
  evaluate-skill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .

      - name: Smoke Test
        run: |
          python -m compileall -q src
          skill-audit --help

      - name: Run Skill Evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          GEMINI_BASE_URL: ${{ vars.GEMINI_BASE_URL }}
          SKILL_AUDIT_PROVIDER: ${{ vars.SKILL_AUDIT_PROVIDER }}
          SKILL_AUDIT_MODEL: ${{ vars.SKILL_AUDIT_MODEL }}
          SKILL_AUDIT_THRESHOLD: ${{ vars.SKILL_AUDIT_THRESHOLD }}
          SKILL_AUDIT_URL: ${{ vars.SKILL_AUDIT_URL }}
          SKILL_AUDIT_REQUIRED: ${{ vars.SKILL_AUDIT_REQUIRED }}
        run: |
          set -euo pipefail

          provider="${SKILL_AUDIT_PROVIDER:-openai}"
          model="${SKILL_AUDIT_MODEL:-gpt-4o}"
          threshold="${SKILL_AUDIT_THRESHOLD:-85}"
          url="${SKILL_AUDIT_URL:-}"
          required="$(echo "${SKILL_AUDIT_REQUIRED:-}" | tr '[:upper:]' '[:lower:]')"

          mapfile -t skill_files < <(find . -name SKILL.md -print | sort)
          if [[ "${#skill_files[@]}" -eq 0 ]]; then
            echo "No SKILL.md found; skipping evaluation."
            exit 0
          fi

          require_or_skip() {
            local message="$1"
            if [[ "$required" == "1" || "$required" == "true" || "$required" == "yes" ]]; then
              echo "$message"
              exit 2
            fi
            echo "$message; skipping."
            exit 0
          }

          case "$provider" in
            openai)
              [[ -n "${OPENAI_API_KEY:-}" ]] || require_or_skip "Missing OPENAI_API_KEY"
              ;;
            minimax)
              [[ -n "${MINIMAX_API_KEY:-}" ]] || require_or_skip "Missing MINIMAX_API_KEY"
              ;;
            claude)
              [[ -n "${ANTHROPIC_API_KEY:-}" ]] || require_or_skip "Missing ANTHROPIC_API_KEY"
              ;;
            gemini)
              [[ -n "${GEMINI_API_KEY:-${GOOGLE_API_KEY:-}}" ]] || require_or_skip "Missing GEMINI_API_KEY/GOOGLE_API_KEY"
              ;;
            *)
              echo "Unknown provider: $provider"
              exit 2
              ;;
          esac

          for f in "${skill_files[@]}"; do
            echo "Evaluating: $f"
            if [[ -n "$url" ]]; then
              skill-audit --file "$f" --provider "$provider" --model "$model" --threshold "$threshold" --url "$url"
            else
              skill-audit --file "$f" --provider "$provider" --model "$model" --threshold "$threshold"
            fi
          done

      - name: Upload Evaluation Report
        if: always() # Upload report even on failure
        uses: actions/upload-artifact@v4
        with:
          name: skill-evaluation-report
          path: report_*.html
          if-no-files-found: ignore
