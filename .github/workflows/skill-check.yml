name: Skill.md Quality Gate

on:
  push:
    paths:
      - "SKILL.md" # Only run when SKILL.md changes
  pull_request:
    paths:
      - "SKILL.md"

jobs:
  evaluate-skill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .

      - name: Run Skill Evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          skill-audit --file SKILL.md --provider openai --model gpt-4o --threshold 85

      - name: Upload Evaluation Report
        if: always() # Upload report even on failure
        uses: actions/upload-artifact@v4
        with:
          name: skill-evaluation-report
          path: report_*.html
